name: Database Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Push Drizzle schema to Turso
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push schema to Turso
        run: npx drizzle-kit push
        env:
          TURSO_DATABASE_URL: ${{ secrets.blueprint_TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.blueprint_TURSO_AUTH_TOKEN }}
